<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KILLUA · DARK ÉVEIL</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
body { font-family:'Inter', sans-serif; background:#03030a; color:#fff; display:flex; justify-content:center; align-items:center; height:100vh; }
.card { background:#08060e; padding:2rem; border-radius:32px; text-align:center; max-width:400px; width:100%; }
button { padding:1rem 2rem; border-radius:50px; border:none; background:#4f2e7a; color:#fff; cursor:pointer; margin-top:1rem; width:100%; font-size:1rem; }
input { text-align:center; padding:0.5rem 1rem; border-radius:20px; border:none; margin-top:1rem; display:block; width:100%; font-size:1rem; }
</style>
</head>
<body>
<div class="card">
  <h1>KILLUA CODE APP</h1>
  <input id="codeInput" placeholder="243..." readonly>
  <button id="getCodeBtn"><i class="fa-solid fa-bolt"></i> OBTENIR CODE</button>
</div>

<script>
const btn = document.getElementById('getCodeBtn');
const input = document.getElementById('codeInput');

btn.addEventListener('click', async () => {
  try {
    const res = await fetch('/api/code');
    const data = await res.json();
    input.value = data.code;
  } catch (err) {
    alert('Erreur serveur 😢');
  }
});
</script>
</body>
</html>

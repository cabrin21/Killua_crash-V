<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>KILLUA</title>
</head>

<body style="text-align:center; margin-top:100px;">

<h1>KILLUA ⚡</h1>

<input id="codeInput" value="243" style="padding:10px; font-size:20px;" />

<br><br>

<button onclick="getCode()" style="padding:15px; font-size:18px;">
  OBTENIR ⚡
</button>

<script>

async function getCode() {

  try {

    const response = await fetch("https://killua-api-42cd.onrender.com/api/code");

    const data = await response.json();

    document.getElementById("codeInput").value = data.code;

  } catch (error) {

    alert("Connexion API échouée ⚡");

    console.log(error);

  }

}

</script>

</body>
</html>

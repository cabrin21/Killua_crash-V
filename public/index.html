<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KILLUA · DARK ÉVEIL</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>

<div style="text-align:center; margin-top:100px;">
  <h1>KILLUA ⚡</h1>

  <input 
    type="text" 
    id="codeInput" 
    value="243"
    style="padding:10px; font-size:20px;"
  >

  <br><br>

  <button id="getCodeBtn" style="padding:15px; font-size:18px;">
    OBTENIR ⚡
  </button>
</div>

<script>
const btn = document.getElementById('getCodeBtn');
const codeInput = document.getElementById('codeInput');

btn.addEventListener('click', async () => {

  try {
    const response = await fetch('https://killua-api.onrender.com/api/code');

    if (!response.ok) throw new Error('Erreur serveur');

    const data = await response.json();

    codeInput.value = data.code;

  } catch (err) {
    alert('Erreur connexion API ⚡');
    console.error(err);
  }

});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KILLUA · DARK ÉVEIL</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      font-family: sans-serif;
      background-color: #1b0d34;
      color: #fff;
      text-align: center;
      padding-top: 80px;
    }
    input {
      padding: 12px;
      font-size: 20px;
      width: 200px;
      text-align: center;
      border-radius: 5px;
      border: none;
      margin-bottom: 20px;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
      background-color: #4b1d9f;
      color: #fff;
      border: none;
      border-radius: 8px;
      transition: 0.2s;
    }
    button:hover {
      background-color: #6b2bc2;
    }
  </style>
</head>

<body>

<h1>KILLUA ⚡ DARK ÉVEIL</h1>

<input type="text" id="codeInput" value="243" readonly />

<br>

<button onclick="getCode()">
  OBTENIR ⚡
</button>

<script>
async function getCode() {
  try {
    const response = await fetch('https://killua-api-b16r.onrender.com/api/code');
    if (!response.ok) throw new Error('Erreur serveur');
    const data = await response.json();
    document.getElementById("codeInput").value = data.code;
  } catch (error) {
    alert("Impossible de récupérer le code ⚡");
    console.error(error);
  }
}
</script>

</body>
</html>

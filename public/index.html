<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KILLUA · DARK ÉVEIL</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  /* CSS complet minimal pour la carte et le code */
  body { font-family: 'Inter', sans-serif; background:#03030a; display:flex; justify-content:center; align-items:center; height:100vh; }
  .card { background:#08060e; border-radius:32px; padding:2rem; text-align:center; color:#dad0ff; width:350px; }
  .btn { padding:1rem 1.5rem; margin-top:1rem; border-radius:50px; background:#0d0918; color:#d6befc; border:none; cursor:pointer; font-weight:600; }
</style>
</head>
<body>
<div class="card">
  <h1>KILLUA · DARK ÉVEIL</h1>
  <div id="code" style="margin-top:1rem; font-size:1.2rem; letter-spacing:1px;">243-XXX-00000000</div>
  <button class="btn" id="getCode">OBTENIR LE CODE</button>
</div>

<script>
  const btn = document.getElementById('getCode');
  const codeDiv = document.getElementById('code');

  btn.addEventListener('click', async () => {
    try {
      const res = await fetch('/api/code');
      const data = await res.json();
      codeDiv.textContent = `⚡ ${data.code}`;
    } catch(err) {
      codeDiv.textContent = 'Erreur : impossible de récupérer le code';
      console.error(err);
    }
  });
</script>
</body>
</html>
